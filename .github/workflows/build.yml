# Build multiplataforma para NeatShift
# Solo ejecuta builds en tags de release (v*) o workflow_dispatch manual
# Docs: https://docs.flet.dev/publish/#github-actions

name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1
  FLET_CLI_CONFIRM_DOWNLOADS: 1

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            artifact: build/linux

          - platform: windows
            os: windows-latest
            artifact: build/windows

          - platform: macos
            os: macos-latest
            artifact: build/macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libsecret-1-dev \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev

      - name: Install Flet
        run: pip install flet

      - name: Build ${{ matrix.platform }}
        run: flet build ${{ matrix.platform }} --verbose

      - name: Clean build artifacts
        run: |
          # Remove .pyc, __pycache__, and other unnecessary files
          if [ "${{ matrix.platform }}" = "windows" ]; then
            # Windows - use PowerShell
            powershell -Command "Get-ChildItem -Path ${{ matrix.artifact }} -Recurse -Include *.pyc,*.pyd,__pycache__ | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue"
          else
            # Linux/Mac - use find
            find ${{ matrix.artifact }} -type f -name "*.pyc" -delete
            find ${{ matrix.artifact }} -type f -name "*.pyd" -delete
            find ${{ matrix.artifact }} -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Package build
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cd ${{ matrix.artifact }}
            7z a -tzip "${{ github.workspace }}/neatshift-${{ matrix.platform }}.zip" *
          else
            tar czf "${{ github.workspace }}/neatshift-${{ matrix.platform }}.tar.gz" -C "${{ matrix.artifact }}" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neatshift-${{ matrix.platform }}
          path: ${{ github.workspace }}/neatshift-${{ matrix.platform }}.*
          if-no-files-found: error
          retention-days: 365

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: neatshift-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
